<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reparto de Casos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#EFF1EC;
  --card:#FFFFFF;
  --ink:#1F2A24;
  --ink-soft:#5B6960;
  --line:#DBE1DA;
  --teal:#2F6F62;
  --teal-dark:#204C42;
  --amber-soft:#F1E3CB;
  --danger:#B54B3F;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.4;
}
header{
  padding:28px 32px 20px;
  border-bottom:1px solid var(--line);
  background:var(--card);
}
header h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:28px;
  margin:0 0 4px;
  color:var(--teal-dark);
}
header p{margin:0;color:var(--ink-soft);}
#conn-status{
  display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;
  font-size:11.5px;font-weight:600;
}
#conn-status.ok{background:#DFF0E7;color:var(--teal-dark);}
#conn-status.bad{background:#F7E0DC;color:var(--danger);}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:24px 32px 60px;
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}
@media (max-width:820px){
  .wrap{grid-template-columns:1fr;padding:16px;}
  header{padding:20px;}
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:16px;
}
.card h2{
  font-family:'Fraunces',serif;
  font-size:15px;
  font-weight:600;
  margin:0 0 12px;
  color:var(--teal-dark);
  text-transform:uppercase;
  letter-spacing:.04em;
}
label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  margin:10px 0 4px;
}
label:first-of-type{margin-top:0;}
input[type=text],input[type=date],input[type=number],select{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:7px;
  font-family:inherit;
  font-size:13.5px;
  background:#FCFCFB;
  color:var(--ink);
}
input:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px;}
button{
  font-family:inherit;
  cursor:pointer;
  border:none;
  border-radius:7px;
  font-weight:600;
  font-size:13px;
}
.btn-primary{
  width:100%;
  margin-top:14px;
  padding:10px;
  background:var(--teal);
  color:#fff;
}
.btn-primary:hover{background:var(--teal-dark);}
.btn-primary:disabled{background:#B7C4BE;cursor:not-allowed;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{
  display:flex;align-items:center;gap:6px;
  background:var(--amber-soft);
  color:var(--teal-dark);
  padding:4px 8px;
  border-radius:20px;
  font-size:12.5px;
  font-weight:500;
}
.chip button{background:none;color:var(--danger);font-size:14px;line-height:1;padding:0 2px;}
.add-row{display:flex;gap:6px;margin-top:6px;}
.add-row input{flex:1;}
.add-row button{padding:8px 10px;background:var(--teal);color:#fff;white-space:nowrap;}

.tabs{display:flex;gap:4px;margin-bottom:14px;}
.tab-btn{padding:8px 16px;background:transparent;color:var(--ink-soft);border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--teal-dark);border-bottom:2px solid var(--teal);}
.tab{display:none;}
.tab.active{display:block;}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.filters select,.filters input{width:auto;min-width:140px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 9px;border-bottom:1px solid var(--line);text-align:left;}
th{
  font-family:'Fraunces',serif;font-weight:600;color:var(--teal-dark);
  font-size:12px;text-transform:uppercase;letter-spacing:.03em;
}
tr:hover td{background:#F7F8F6;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;background:var(--amber-soft);color:var(--teal-dark);font-size:11.5px;font-weight:600;}
.del-btn{color:var(--danger);background:none;font-size:16px;padding:2px 6px;}
.del-btn:hover{background:#F4E4E1;border-radius:6px;}
.empty{color:var(--ink-soft);padding:24px 0;text-align:center;font-size:13.5px;}

.resumen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.resumen-card{background:#F7F8F6;border:1px solid var(--line);border-radius:8px;padding:12px;}
.resumen-card .nombre{font-weight:700;color:var(--teal-dark);font-size:13.5px;margin-bottom:4px;}
.resumen-card .num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
.resumen-card .sub{font-size:11.5px;color:var(--ink-soft);}

.balance-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.balance-label{width:110px;font-size:12.5px;font-weight:600;flex-shrink:0;}
.balance-track{flex:1;background:#E4E9E3;border-radius:6px;height:20px;position:relative;overflow:hidden;}
.balance-fill{background:linear-gradient(90deg,var(--teal),var(--teal-dark));height:100%;border-radius:6px;transition:width .4s ease;}
.balance-val{width:70px;text-align:right;font-size:12px;color:var(--ink-soft);flex-shrink:0;}
.note{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.status-msg{font-size:12px;color:var(--ink-soft);margin-top:8px;min-height:16px;}
</style>
</head>
<body>

<header>
  <h1>Reparto de casos</h1>
  <p>Registro de derivaciones de urgencia a intervención — seguimiento semanal y conteo de puntos por profesional.</p>
  <span id="conn-status">Conectando…</span>
</header>

<div class="wrap">
  <div>
    <div class="card">
      <h2>Nuevo registro</h2>
      <label for="f-fecha">Fecha</label>
      <input type="date" id="f-fecha">
      <label for="f-usuaria">Usuaria (caso derivado)</label>
      <input type="text" id="f-usuaria" placeholder="Nombre o iniciales">
      <label for="f-pr1">PR1 — quien deriva (urgencia)</label>
      <select id="f-pr1"></select>
      <label for="f-pr">PR — quien asume (intervención)</label>
      <select id="f-pr"></select>
      <label for="f-puntos">Puntos</label>
      <input type="number" id="f-puntos" value="1" min="0" step="0.5">
      <label for="f-notas">Notas (opcional)</label>
      <input type="text" id="f-notas" placeholder="Observaciones breves">
      <button class="btn-primary" onclick="addCaso()">Añadir registro</button>
      <div class="status-msg" id="form-status"></div>
    </div>

    <div class="card">
      <h2>Equipo — intervención (PR)</h2>
      <div class="chip-row" id="chips-pr"></div>
      <div class="add-row">
        <input type="text" id="new-pr" placeholder="Nombre nueva PR">
        <button onclick="addProfesional('pr')">Añadir</button>
      </div>
    </div>

    <div class="card">
      <h2>Equipo — urgencia (PR1)</h2>
      <div class="chip-row" id="chips-pr1"></div>
      <div class="add-row">
        <input type="text" id="new-pr1" placeholder="Nombre nueva PR1">
        <button onclick="addProfesional('pr1')">Añadir</button>
      </div>
    </div>
  </div>

  <div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="registros" onclick="switchTab('registros')">Registros</button>
      <button class="tab-btn" data-tab="resumen" onclick="switchTab('resumen')">Resumen y reparto</button>
    </div>

    <div class="tab active" id="tab-registros">
      <div class="card">
        <div class="filters">
          <select id="filter-semana" onchange="renderTabla()"></select>
          <select id="filter-pr" onchange="renderTabla()"></select>
          <input type="text" id="filter-usuaria" placeholder="Buscar usuaria…" oninput="renderTabla()">
        </div>
        <div id="tabla-container"></div>
      </div>
    </div>

    <div class="tab" id="tab-resumen">
      <div class="card">
        <h2>Reparto de la semana actual</h2>
        <div id="balance-actual"></div>
        <p class="note" id="semana-actual-label"></p>
      </div>
      <div class="card">
        <h2>Totales acumulados por PR</h2>
        <div class="resumen-grid" id="resumen-totales"></div>
      </div>
      <div class="card">
        <h2>Puntos por semana y PR</h2>
        <div id="tabla-semanas"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase (compat SDK, sencillo de leer/editar) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// ======================================================================
// PASO OBLIGATORIO: sustituye estos valores por los de TU proyecto Firebase
// (Firebase console > Configuración del proyecto > Tus apps > Config)
// ======================================================================
const firebaseConfig = {
  apiKey: "AIzaSyCkQ9fFIkIQo_ESLLR8Q35e53Mes1w2ago",
  authDomain: "asignacion-de-casos-b3f47.firebaseapp.com",
  projectId: "asignacion-de-casos-b3f47",
  storageBucket: "asignacion-de-casos-b3f47.firebasestorage.app",
  messagingSenderId: "668108671708",
  appId: "1:668108671708:web:ffc6af37c8056b38cbc219"
};
// ======================================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let casos = [];
let equipo = { pr: [], pr1: [] };

function todayStr(){ return new Date().toISOString().slice(0,10); }

function getWeekLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const week = Math.ceil((days + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-S${String(week).padStart(2,'0')}`;
}

function setStatus(ok){
  const el = document.getElementById('conn-status');
  el.textContent = ok ? 'Conectado — datos en tiempo real' : 'Sin conexión a la base de datos';
  el.className = ok ? 'ok' : 'bad';
}

// --- Escuchar cambios en tiempo real -------------------------------------
db.collection('casos').orderBy('fecha', 'desc').onSnapshot(snap=>{
  casos = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  setStatus(true);
  renderAll();
}, err=>{
  console.error(err);
  setStatus(false);
  document.getElementById('form-status').textContent =
    'No se pudo conectar. Revisa la configuración de Firebase (ver comentario en el código).';
});

db.collection('config').doc('equipo').onSnapshot(doc=>{
  equipo = doc.exists ? doc.data() : { pr: [], pr1: [] };
  if(!equipo.pr) equipo.pr = [];
  if(!equipo.pr1) equipo.pr1 = [];
  renderAll();
});

document.getElementById('f-fecha').value = todayStr();

// --- Acciones -------------------------------------------------------------
function addCaso(){
  const fecha = document.getElementById('f-fecha').value;
  const usuaria = document.getElementById('f-usuaria').value.trim();
  const pr1 = document.getElementById('f-pr1').value;
  const pr = document.getElementById('f-pr').value;
  const puntos = parseFloat(document.getElementById('f-puntos').value) || 0;
  const notas = document.getElementById('f-notas').value.trim();
  const status = document.getElementById('form-status');

  if(!fecha || !usuaria || !pr1 || !pr){
    status.textContent = 'Falta fecha, usuaria, PR1 o PR.';
    return;
  }

  db.collection('casos').add({
    fecha, semana: getWeekLabel(fecha), usuaria, pr1, pr, puntos, notas
  }).then(()=>{
    document.getElementById('f-usuaria').value = '';
    document.getElementById('f-notas').value = '';
    document.getElementById('f-puntos').value = '1';
    status.textContent = 'Registro añadido.';
    setTimeout(()=>status.textContent='', 2000);
  }).catch(e=>{ status.textContent = 'Error al guardar: ' + e.message; });
}

function deleteCaso(id){
  db.collection('casos').doc(id).delete();
}

function addProfesional(tipo){
  const input = document.getElementById(tipo==='pr' ? 'new-pr' : 'new-pr1');
  const nombre = input.value.trim();
  if(!nombre) return;
  if(equipo[tipo].includes(nombre)){ input.value=''; return; }
  const nuevo = { ...equipo, [tipo]: [...equipo[tipo], nombre] };
  db.collection('config').doc('equipo').set(nuevo);
  input.value = '';
}

function removeProfesional(tipo, nombre){
  const nuevo = { ...equipo, [tipo]: equipo[tipo].filter(n=>n!==nombre) };
  db.collection('config').doc('equipo').set(nuevo);
}

// --- Render -----------------------------------------------------------
function renderAll(){
  renderChips();
  renderSelects();
  renderTabla();
  renderResumen();
}

function renderChips(){
  const wraps = { pr: document.getElementById('chips-pr'), pr1: document.getElementById('chips-pr1') };
  ['pr','pr1'].forEach(tipo=>{
    const el = wraps[tipo];
    el.innerHTML = '';
    if(equipo[tipo].length===0){
      el.innerHTML = '<span class="note">Aún no hay nadie en la lista.</span>';
      return;
    }
    equipo[tipo].forEach(nombre=>{
      const chip = document.createElement('span');
      chip.className='chip';
      chip.innerHTML = `${nombre} <button onclick="removeProfesional('${tipo}','${nombre.replace(/'/g,"\\'")}')">×</button>`;
      el.appendChild(chip);
    });
  });
}

function renderSelects(){
  const selPr1 = document.getElementById('f-pr1');
  const selPr = document.getElementById('f-pr');
  const filterPr = document.getElementById('filter-pr');
  const filterSemana = document.getElementById('filter-semana');

  const prevPr1 = selPr1.value, prevPr = selPr.value, prevFilterPr = filterPr.value, prevFilterSemana = filterSemana.value;

  selPr1.innerHTML = equipo.pr1.length ? equipo.pr1.map(n=>`<option value="${n}">${n}</option>`).join('') : '<option value="">Añade una PR1 primero</option>';
  selPr.innerHTML = equipo.pr.length ? equipo.pr.map(n=>`<option value="${n}">${n}</option>`).join('') : '<option value="">Añade una PR primero</option>';

  if(equipo.pr1.includes(prevPr1)) selPr1.value = prevPr1;
  if(equipo.pr.includes(prevPr)) selPr.value = prevPr;

  filterPr.innerHTML = '<option value="">Todas las PR</option>' + equipo.pr.map(n=>`<option value="${n}">${n}</option>`).join('');
  if(equipo.pr.includes(prevFilterPr)) filterPr.value = prevFilterPr;

  const semanas = [...new Set(casos.map(c=>c.semana))].sort().reverse();
  filterSemana.innerHTML = '<option value="">Todas las semanas</option>' + semanas.map(s=>`<option value="${s}">${s}</option>`).join('');
  if(semanas.includes(prevFilterSemana)) filterSemana.value = prevFilterSemana;
}

function renderTabla(){
  const cont = document.getElementById('tabla-container');
  const fSemana = document.getElementById('filter-semana').value;
  const fPr = document.getElementById('filter-pr').value;
  const fUsuaria = document.getElementById('filter-usuaria').value.toLowerCase();

  let filtrados = [...casos];
  if(fSemana) filtrados = filtrados.filter(c=>c.semana===fSemana);
  if(fPr) filtrados = filtrados.filter(c=>c.pr===fPr);
  if(fUsuaria) filtrados = filtrados.filter(c=>c.usuaria.toLowerCase().includes(fUsuaria));

  if(filtrados.length===0){
    cont.innerHTML = '<div class="empty">No hay registros que coincidan. Añade uno desde el formulario de la izquierda.</div>';
    return;
  }

  cont.innerHTML = `<table>
    <thead><tr><th>Fecha</th><th>Semana</th><th>Usuaria</th><th>PR1</th><th>PR</th><th>Puntos</th><th>Notas</th><th></th></tr></thead>
    <tbody>
      ${filtrados.map(c=>`
        <tr>
          <td>${c.fecha}</td>
          <td><span class="pill">${c.semana}</span></td>
          <td>${c.usuaria}</td>
          <td>${c.pr1}</td>
          <td>${c.pr}</td>
          <td>${c.puntos}</td>
          <td>${c.notas||''}</td>
          <td><button class="del-btn" onclick="deleteCaso('${c.id}')" title="Eliminar">×</button></td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderResumen(){
  const semanaHoy = getWeekLabel(todayStr());
  const semanas = [...new Set(casos.map(c=>c.semana))].sort();
  const semanaActual = semanas.length ? semanas[semanas.length-1] : semanaHoy;
  document.getElementById('semana-actual-label').textContent = `Semana de referencia: ${semanaActual}`;

  const casosSemana = casos.filter(c=>c.semana===semanaActual);
  const balancePorPr = {};
  equipo.pr.forEach(n=>balancePorPr[n]=0);
  casosSemana.forEach(c=>{ balancePorPr[c.pr] = (balancePorPr[c.pr]||0) + c.puntos; });

  const maxVal = Math.max(1, ...Object.values(balancePorPr));
  const balanceEl = document.getElementById('balance-actual');
  const nombres = Object.keys(balancePorPr);
  balanceEl.innerHTML = nombres.length===0
    ? '<div class="empty">Añade profesionales de intervención para ver el reparto.</div>'
    : nombres.map(n=>{
        const val = balancePorPr[n];
        const pct = (val/maxVal*100).toFixed(0);
        return `<div class="balance-row">
          <div class="balance-label">${n}</div>
          <div class="balance-track"><div class="balance-fill" style="width:${pct}%"></div></div>
          <div class="balance-val">${val} pts</div>
        </div>`;
      }).join('');

  const totales = {};
  equipo.pr.forEach(n=>totales[n]={casosN:0,puntos:0});
  casos.forEach(c=>{
    if(!totales[c.pr]) totales[c.pr] = {casosN:0,puntos:0};
    totales[c.pr].casosN += 1;
    totales[c.pr].puntos += c.puntos;
  });
  const totalesEl = document.getElementById('resumen-totales');
  const nombresTot = Object.keys(totales);
  totalesEl.innerHTML = nombresTot.length===0
    ? '<div class="empty">Sin datos todavía.</div>'
    : nombresTot.map(n=>`
      <div class="resumen-card">
        <div class="nombre">${n}</div>
        <div class="num">${totales[n].puntos}</div>
        <div class="sub">${totales[n].casosN} caso(s) en total</div>
      </div>`).join('');

  const tablaSemanasEl = document.getElementById('tabla-semanas');
  if(semanas.length===0 || equipo.pr.length===0){
    tablaSemanasEl.innerHTML = '<div class="empty">Sin datos suficientes todavía.</div>';
  } else {
    const semanasOrdenadas = [...semanas].sort().reverse();
    tablaSemanasEl.innerHTML = `<table>
      <thead><tr><th>Semana</th>${equipo.pr.map(n=>`<th>${n}</th>`).join('')}</tr></thead>
      <tbody>
        ${semanasOrdenadas.map(s=>{
          const filaCasos = casos.filter(c=>c.semana===s);
          return `<tr><td><span class="pill">${s}</span></td>${equipo.pr.map(n=>{
            const suma = filaCasos.filter(c=>c.pr===n).reduce((a,c)=>a+c.puntos,0);
            return `<td>${suma||''}</td>`;
          }).join('')}</tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='resumen') renderResumen();
}
</script>
</body>
</html>
